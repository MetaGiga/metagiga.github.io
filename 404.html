<!DOCTYPE html>
<html lang="ja" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#fafbfd" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0b1020" media="(prefers-color-scheme: dark)">
<meta name="color-scheme" content="light dark">
<title>ページが見つかりません (404) - MetaGiga</title>
<meta name="description" content="お探しのページは見つかりませんでした トップページからご利用のコンテンツをお探しください">
<meta name="robots" content="noindex,follow">
<link rel="canonical" href="https://metagiga.github.io/404.html">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",Meiryo,sans-serif;background:#fafbfd;color:#1a1d29;min-height:100vh;min-height:100dvh;display:grid;place-items:center;padding:24px;line-height:1.8;font-size:16px}
main{max-width:560px;text-align:center}
.code{font-size:clamp(56px,14vw,84px);font-weight:800;background:linear-gradient(135deg,#f6851b,#cc6a00);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:.05em;line-height:1;margin-bottom:16px}
h1{font-size:clamp(20px,4vw,26px);font-weight:800;margin-bottom:12px;color:#1a1d29}
p{color:#4a5068;margin-bottom:28px}
.btn{display:inline-block;padding:14px 28px;background:linear-gradient(135deg,#f6851b,#cc6a00);color:#fff;text-decoration:none;border-radius:10px;font-weight:700;min-height:48px;min-width:48px;box-shadow:0 4px 12px rgba(246,133,27,.3)}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(246,133,27,.4)}
.btn:focus-visible{outline:3px solid #ffb020;outline-offset:3px}
a:focus-visible{outline:3px solid #ffb020;outline-offset:3px;border-radius:6px}
@media (prefers-color-scheme:dark){body{background:#0b1020;color:#ebeef8}h1{color:#ebeef8}p{color:#b3bbd1}}
@media (prefers-reduced-motion:reduce){.btn:hover{transform:none}*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<main role="main">
  <div class="code" aria-hidden="true">404</div>
  <h1>ページが見つかりません</h1>
  <p>お探しのページは存在しないか、移動した可能性があります。<br>トップページからあらためてご利用のコンテンツをお探しください。</p>
  <a class="btn" href="/">トップページへ戻る</a>
</main>
</body>
</html>
